<!DOCTYPE html>
<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
        <title>Babylon.js - Animation Controller</title>
        <!-- Babylon.js CDN -->
        <script src="https://cdn.babylonjs.com/babylon.js"></script>
        <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
        <style>
            html, body {
                overflow: hidden;
                width: 100%;
                height: 100%;
                margin: 0;
                padding: 0;
            }
            #renderCanvas {
                width: 100%;
                height: 100%;
                touch-action: none;
            }
            #instructions {
                position: absolute;
                top: 10px;
                left: 10px;
                color: white;
                background: rgba(0,0,0,0.6);
                padding: 10px;
                font-family: Arial, sans-serif;
                pointer-events: none;
                max-height: 90vh;
                overflow-y: auto;
            }
        </style>
    </head>
    <body>
        <canvas id="renderCanvas"></canvas>
        <div id="instructions">
            <h3>Contrôles (Clavier AZERTY)</h3>
            <ul id="animList">
                <li>Z/Q/S/D : Déplacements (Jog)</li>
                <li>Shift + Z/Q/S/D : Marcher (Walk)</li>
                <li>Espace : Sauter (Jump)</li>
                <li>Directions diagonales supportées</li>
            </ul>
        </div>
        <script src="babylon_game.js"></script>
    </body>
</html>
